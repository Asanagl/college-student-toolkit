appId: com.collegestudent.toolkit
productName: 大学生工具组
directories:
  output: release
files:
  # 前端构建产物（精确指定，避免把 win-unpacked 打包进 asar）
  - dist/assets/**/*
  - dist/index.html
  # 主进程 / preload 编译产物
  - dist-electron/**/*
  # 应用资源
  - resources/**/*
  # 依赖打包规则：排除文档/测试/源码/类型定义等无用文件
  - "!**/node_modules/**/{README,readme,CHANGELOG,changelog,HISTORY,history,LICENSE,license,LICENCE,licence}*"
  - "!**/node_modules/**/{test,tests,__tests__,docs,doc,examples,example,coverage,*.md,*.markdown,*.ts,*.flow,*.coffee,*.map}"
  - "!**/node_modules/**/{*.tsbuildinfo,*.tar.gz,*.tgz,*.zip}"
  # better-sqlite3：只保留 prebuilds（预编译二进制），排除源码和构建中间产物
  - "!**/node_modules/better-sqlite3/{src,build,deps}/**"
  # tesseract.js：排除文档
  - "!**/node_modules/tesseract.js/docs/**"
  # 排除杂项文件
  - "!**/*.{iml,o,hprof,orig,pyc,pyo,rbc,swp,csproj,sln,xproj}"
  - "!.editorconfig"
  - "!**/._*"
# 启用 asar 打包（应用代码单文件，减少碎片）
asar: true
# Electron 语言包只保留中文和英文（默认 56 种语言约 37MB → 约 1MB）
electronLanguages:
  - zh-CN
  - en-US
# Windows 安装包：NSIS（允许用户选择安装目录、创建快捷方式）
win:
  target:
    - target: nsis
      arch:
        - x64
  # 签名相关字段留空，发布时通过环境变量 CSC_LINK/CSC_KEY_PASSWORD 注入
  # signingHashAlgorithms: ['sha256']
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: 大学生工具组
  # 卸载时清理用户数据需用户确认，默认保留
  deleteAppDataOnUninstall: false
# Linux 可选：AppImage 便于跨发行版分发
linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Education
publish:
  provider: github
  owner: Asanagl
  repo: college-student-toolkit
